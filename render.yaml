services:
  - type: web
    name: aeronex-cipl-generator
    runtime: python
    plan: free
    buildCommand: "bash render_build.sh"
    startCommand: "python3 -m uvicorn python_backend.main:app --host 0.0.0.0 --port 8001"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PYTHONUNBUFFERED
        value: "1"
