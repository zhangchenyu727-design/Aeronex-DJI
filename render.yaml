services:
  - type: web
    name: aeronex-cipl-generator
    runtime: python
    plan: free
    buildCommand: "bash render_build.sh"
    startCommand: "bash render_start.sh"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PYTHONUNBUFFERED
        value: "1"
